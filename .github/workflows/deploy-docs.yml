name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "site/**"
      - "apps/studio/**"
      - "packages/studio-*/**"
      - "scripts/sync-docs-site.mjs"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Studio (apps/studio + packages/studio-*) needs the full pnpm workspace —
      # site/ itself stays on its own isolated npm install below, untouched.
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace (for Studio only)
        run: pnpm install --frozen-lockfile

      - name: Build + sync Studio into site/public/studio-app
        run: npm run sync:studio-app

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site
        run: npm ci --prefix site

      - name: Build site
        run: npm run build --prefix site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
