name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      # Same pre-publish gate as CI (.github/workflows/ci.yml) — a release
      # must never ship a build that CI itself would have failed.
      - name: Build packages
        run: pnpm run build:packages

      - name: Core tests
        run: pnpm run test:core

      - name: Adapter tests
        run: pnpm run test:adapters

      - name: Widget tests
        run: pnpm run test:widgets

      - name: Build Angular library
        run: pnpm run build:angular

      - name: Angular tests
        run: pnpm run test:angular

      - name: Bundle / tree-shaking check
        run: pnpm run test:bundle

      - name: Core bundle budgets
        run: pnpm run test:core-bundle

      - name: Theme class parity
        run: pnpm run test:themes

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release:stage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
