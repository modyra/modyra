<svg xmlns="http://www.w3.org/2000/svg" style="display: none;" aria-hidden="true">
  <defs>
    <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%">
      
      <feColorMatrix in="SourceGraphic" type="saturate" values="1.8" result="vibrantGraphic"></feColorMatrix>
      
      
      <feGaussianBlur in="vibrantGraphic" stdDeviation="12" result="blurred"></feGaussianBlur>
      
      
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise"></feTurbulence>
      
      
      <feDisplacementMap in="blurred" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" result="displaced"></feDisplacementMap>
      
      
      <feFlood flood-color="rgba(255, 255, 255, 0.05)" result="glassTint"></feFlood>
      <feComposite in="glassTint" in2="displaced" operator="in" result="tintMasked"></feComposite>
      
      
      <feBlend mode="screen" in="tintMasked" in2="displaced"></feBlend>
    </filter>
  </defs>
</svg>