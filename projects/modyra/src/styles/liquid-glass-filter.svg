<svg xmlns="http://www.w3.org/2000/svg" style="display: none;" aria-hidden="true">
  <defs>
    <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%">
      <!-- 1. Apple Vibrancy: Aumenta drammaticamente la saturazione prima del blur 
           per evitare l'effetto pallido e preservare l'energia visiva dello sfondo -->
      <feColorMatrix in="SourceGraphic" type="saturate" values="1.8" result="vibrantGraphic" />
      
      <!-- 2. Apple Frost Blur: Sfocatura densa "lattea" (stdDeviation=12 simula un potente 
           blur di fondo in CSS, garantendo massima leggibilità testo) -->
      <feGaussianBlur in="vibrantGraphic" stdDeviation="12" result="blurred" />
      
      <!-- 3. Liquid Generative Noise: Una "baseFrequency" molto bassa crea le onde tipiche dello 
           spessore del vero cristallo fuso, anziché le normali "bolle/rumore" -->
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
      
      <!-- 4. Liquid Refraction: Distorce lo sfondo iper-saturato e sfocato (Rifrazione Ottica) -->
      <feDisplacementMap in="blurred" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      
      <!-- 5. Specular Sheen (Apple Frost Tint): Un velo ottico semi-trasparente ultra-pulito
           che regala l'effetto 'vetro costoso'. Per Dark Mode può diventar rgba(0,0,0,0.2) o rgba(255,255,255,0.03) -->
      <feFlood flood-color="rgba(255, 255, 255, 0.05)" result="glassTint" />
      <feComposite in="glassTint" in2="displaced" operator="in" result="tintMasked" />
      
      <!-- 6. Composizione Finale: Screen blend fonde il layer speculare aggiungendo sottile luce volumetrica -->
      <feBlend mode="screen" in="tintMasked" in2="displaced" />
    </filter>
  </defs>
</svg>
